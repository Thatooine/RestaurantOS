auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required for the native OTLP endpoint: OTel attributes are stored as
  # structured metadata so they can be queried without LogQL parsers.
  allow_structured_metadata: true
  retention_period: 168h # 7 days

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem